        launch: ["/nix/store/mi3rnj81243b0dw7v024g8726zhgw845-obs-cmd-1.0.0/bin/obs-cmd", "-w", "obsws://localhost:4455/vFsIHP1gEEe0mGtf", "record", "toggle"]
      KEY_C:
        launch: ["/home/seththecat/.nix-profile/bin/obs-cmd", "-w", "obsws://localhost:4455/bWjxvLEZNTnomG4C", "source", "mute", "--toggle", "Mic/Aux"]
      KEY_B:
