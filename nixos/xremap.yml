        launch: ["/nix/store/mi3rnj81243b0dw7v024g8726zhgw845-obs-cmd-1.0.0/bin/obs-cmd", "-w", "obsws://localhost:4455/vFsIHP1gEEe0mGtf", "stream", "toggle"]
